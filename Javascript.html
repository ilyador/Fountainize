<script>
// Vanilla-JS sidebar logic (no jQuery). Talks to the server via google.script.run.
(function(){
  var run = google.script.run;
  var titlePageActive = false;
  var licenseValid = false;

  function $(id){ return document.getElementById(id); }
  function qs(sel){ return document.querySelector(sel); }
  function on(id, ev, fn){ var el = $(id); if(el){ el.addEventListener(ev, fn); } }
  function setBusy(btn, busy, label){ btn.disabled = busy; btn.textContent = busy ? 'Working…' : label; }

  // ---- collapsible accordions ----
  Array.prototype.forEach.call(document.getElementsByClassName('collapsible'), function(c){
    c.addEventListener('click', function(){
      this.classList.toggle('active');
      var content = this.nextElementSibling;
      content.style.display = content.style.display === 'block' ? 'none' : 'block';
    });
  });

  // ---- read sidebar state ----
  function options(){
    return {
      type: $('r-selection').checked ? 'selection' : 'whole',
      sceneNumbers: $('scene-numbers').checked,
      endPunct: $('endPunctuationMeansNotChar').checked,
      autoFonts: $('format-margins-option').checked
    };
  }
  function tpInfo(){
    return {
      title: $('tp-title').value, subtitle: $('tp-subtitle').value, author: $('tp-author').value,
      contact1: $('tp-contact1').value, contact2: $('tp-contact2').value,
      contact3: $('tp-contact3').value, contact4: $('tp-contact4').value
    };
  }
  function charListFromGrid(){
    var list = [], max = licenseValid ? 16 : 6;
    for(var i = 1; i < max; i++){
      var sh = qs('#char' + i + ' .charShort').value;
      if(sh !== '' && sh !== '-'){
        list.push({ sh: sh.toUpperCase(), name: qs('#char' + i + ' .charLong').value.toUpperCase() });
      }
    }
    return list;
  }

  // ---- format ----
  on('format', 'click', function(){
    if(titlePageActive){ toggleTitlePage(); return; }
    var btn = $('format'), o = options();
    setBusy(btn, true, 'Format Script');
    run.withSuccessHandler(function(){
      run.withSuccessHandler(function(chars){ setBusy(btn, false, 'Format Script'); fillCharGrid(chars); })
         .withFailureHandler(function(){ setBusy(btn, false, 'Format Script'); })
         .convert(o.type, o.sceneNumbers, o.autoFonts, o.endPunct);
    }).getCharsFromDOM(charListFromGrid());
  });

  // ---- format just the current block / selection (fast, incremental) ----
  on('format-block', 'click', function(){
    var btn = $('format-block'), o = options();
    setBusy(btn, true, 'Format This Block');
    run.withSuccessHandler(function(){
      run.withSuccessHandler(function(chars){ setBusy(btn, false, 'Format This Block'); fillCharGrid(chars); })
         .withFailureHandler(function(){ setBusy(btn, false, 'Format This Block'); })
         .formatSelection(o.sceneNumbers, o.autoFonts, o.endPunct);
    }).getCharsFromDOM(charListFromGrid());
  });

  // Repopulate the character-shortcut grid from the server's char list.
  function fillCharGrid(chars){
    chars = chars || [];
    for(var i = 1; i < 16; i++){
      var shEl = qs('#char' + i + ' .charShort'), longEl = qs('#char' + i + ' .charLong');
      if(i <= chars.length){
        shEl.value = chars[i - 1].sh; longEl.value = chars[i - 1].name;
      } else if(i < 6){
        shEl.value = ''; longEl.value = '';
      } else {
        shEl.value = licenseValid ? '' : '-';
        longEl.value = licenseValid ? '' : 'Upgrade for more';
      }
    }
  }

  // ---- set up document ----
  on('doc', 'click', function(){ run.docSetUp(); });

  // ---- title page toggle ----
  function toggleTitlePage(){
    var tpBtn = $('title-page-button'), fmtBtn = $('format');
    if(titlePageActive){
      run.removeTitlePage();
      tpBtn.classList.replace('red', 'blue'); fmtBtn.classList.replace('red', 'blue');
      tpBtn.textContent = 'Add Title Page'; fmtBtn.textContent = 'Format Script';
    } else {
      run.addTitlePage(tpInfo());
      tpBtn.classList.replace('blue', 'red'); fmtBtn.classList.replace('blue', 'red');
      tpBtn.textContent = 'Remove Title Page'; fmtBtn.textContent = 'Remove Title Page';
    }
    titlePageActive = !titlePageActive;
    run.storeSettings('titlePageActive', titlePageActive);
  }
  on('title-page-button', 'click', toggleTitlePage);

  // ---- options (persist on change) ----
  on('scene-numbers', 'click', function(){ run.storeSettings('sceneNumbers', $('scene-numbers').checked); });
  on('format-margins-option', 'click', function(){ run.storeSettings('formatMarginsOption', $('format-margins-option').checked); });
  on('r-whole', 'click', function(){ run.storeSettings('formatRange', 'whole'); });
  on('r-selection', 'click', function(){ run.storeSettings('formatRange', 'selection'); });

  // ---- license ----
  on('license-btn', 'click', function(){
    var key = $('license-text').value;
    if(key){ run.withSuccessHandler(licenseResult).checkLicenseKey(key); }
  });
  on('unlicense-btn', 'click', function(){ run.withSuccessHandler(function(){ alert('License successfully removed!'); }).removeLicense(); });
  on('show-license-btn', 'click', function(){ run.withSuccessHandler(showLicense).getLicense(); });

  function showLicense(license){
    if(license){ try { $('your-license-key').textContent = JSON.parse(license).license_key; } catch(e){} }
  }
  function licenseResult(data){
    if(data && data.success === true && data.purchase){
      alert('Thanks! License activated. Refresh your document to apply.');
    } else {
      alert("Sorry! We didn't recognize that license key. Check it's correct, then contact cathcart.brandon@gmail.com for support.");
    }
  }

  // ---- restore saved settings + license-driven UI on load ----
  function loadSettings(s){
    if(!s){ return; }
    $('scene-numbers').checked = !!s.sceneNumbers;
    $('format-margins-option').checked = s.hasOwnProperty('formatMarginsOption') ? s.formatMarginsOption : true;
    var whole = !s.hasOwnProperty('formatRange') || s.formatRange === 'whole';
    $('r-whole').checked = whole; $('r-selection').checked = !whole;

    if(s.tpInfo){
      var t = s.tpInfo;
      $('tp-title').value = t.title || ''; $('tp-subtitle').value = t.subtitle || ''; $('tp-author').value = t.author || '';
      $('tp-contact1').value = t.contact1 || ''; $('tp-contact2').value = t.contact2 || '';
      $('tp-contact3').value = t.contact3 || ''; $('tp-contact4').value = t.contact4 || '';
    }
    titlePageActive = !!s.titlePageActive;
    if(titlePageActive){
      $('title-page-button').classList.replace('blue', 'red'); $('format').classList.replace('blue', 'red');
      $('title-page-button').textContent = 'Remove Title Page'; $('format').textContent = 'Remove Title Page';
    }
  }

  function changeDOMBasedOnLicense(valid){
    licenseValid = valid;
    var groups = document.querySelectorAll('.char-group');
    if(licenseValid){
      groups.forEach(function(g){ g.classList.remove('disabled'); });
      $('free-pro-content').style.display = 'none';
      $('pro-pro-content').style.display = 'block';
      $('pro-tab-text').textContent = 'Your pro license';
    } else {
      groups.forEach(function(g){
        var n = Number((g.id || '').replace('char', ''));
        if(n > 5){ qs('#' + g.id + ' .charLong').value = 'Upgrade for more'; g.classList.add('disabled'); }
      });
      var tpBtn = $('title-page-button');
      tpBtn.textContent = 'Add Title Page (Pro)'; tpBtn.classList.add('disabled');
      $('free-pro-content').style.display = 'block';
      $('pro-pro-content').style.display = 'none';
    }
  }

  // gentle periodic pulse on the Pro tab
  setInterval(function(){
    var el = $('pro-collapsible'); if(!el){ return; }
    var n = 0;
    var t = setInterval(function(){ el.classList.toggle('blue-text'); if(++n >= 6){ clearInterval(t); el.classList.remove('blue-text'); } }, 500);
  }, 1000 * 60 * 5);

  // init
  run.withSuccessHandler(loadSettings).getSettings();
  run.withSuccessHandler(changeDOMBasedOnLicense).isLicenseValid();
  run.withSuccessHandler(fillCharGrid).getCharsFromStorage();
})();
</script>
